services:
  # ── Backend (Flask / Gunicorn) ───────────────────────────────────────────
  - type: web
    name: smart-inventory-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python seed.py
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --timeout 120 "app:create_app()"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false          # set manually in Render dashboard
      - key: CORS_ORIGINS
        value: https://smart-inventory-ui.onrender.com

  # ── Frontend (static site) ───────────────────────────────────────────────
  - type: web
    name: smart-inventory-ui
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://smart-inventory-api.onrender.com
