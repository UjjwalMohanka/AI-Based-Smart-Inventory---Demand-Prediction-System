version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-inventory-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - db_data:/app
    env_file:
      - ./backend/.env
    environment:
      - FLASK_ENV=production
      - CORS_ORIGINS=http://localhost:80,http://localhost

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=http://localhost:5000
    container_name: smart-inventory-ui
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
