# Render Blueprint Configuration
# Documentation: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: ai-smart-inventory
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        description: "Your MySQL connection string (e.g. mysql+pymysql://user:pass@host/db)"
      # Render automatically supplies PORT
