{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <div class="text-center mb-4">
        <h2 class="mb-2">Create Account</h2>
        <p class="text-muted small uppercase fw-bold tracking-widest">Join the smart inventory network</p>
    </div>
    
    <form method="POST">
        <div class="mb-3">
            <label for="username" class="form-label fw-600">Username</label>
            <div class="input-group">
                <span class="input-group-text bg-white border-end-0"><i class="fas fa-user text-muted"></i></span>
                <input type="text" class="form-control border-start-0 ps-0" id="username" name="username" placeholder="Choose a username" required>
            </div>
        </div>
        
        <div class="mb-3">
            <label for="password" class="form-label fw-600">Password</label>
            <div class="input-group">
                <span class="input-group-text bg-white border-end-0"><i class="fas fa-lock text-muted"></i></span>
                <input type="password" class="form-control border-start-0 ps-0" id="password" name="password" placeholder="Create a password" required>
            </div>
        </div>
        
        <div class="mb-3">
            <label for="role" class="form-label fw-600">Role</label>
            <div class="input-group">
                <span class="input-group-text bg-white border-end-0"><i class="fas fa-user-tag text-muted"></i></span>
                <select class="form-select border-start-0 ps-0" id="role" name="role" required>
                    <option value="viewer">Viewer (Read Only)</option>
                    <option value="admin">Admin (Full Access)</option>
                </select>
            </div>
        </div>
        
        <div class="d-grid gap-2 mt-4">
            <button type="submit" class="btn btn-primary fw-bold py-2">Sign Up</button>
        </div>
    </form>
    
    <div class="text-center mt-4 text-muted small">
        Already have an account? <a href="{{ url_for('auth.login') }}" class="text-primary text-decoration-none fw-600">Sign in here</a>
    </div>
</div>
{% endblock %}
