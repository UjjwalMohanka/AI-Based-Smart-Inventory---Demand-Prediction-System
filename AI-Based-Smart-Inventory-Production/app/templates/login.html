{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <div class="text-center mb-4">
        <h2 class="mb-2">Welcome Back</h2>
        <p class="text-muted small uppercase fw-bold tracking-widest">Sign in to your dashboard</p>
    </div>
    
    <form method="POST">
        <div class="mb-3">
            <label for="username" class="form-label fw-600">Username</label>
            <div class="input-group">
                <span class="input-group-text bg-white border-end-0"><i class="fas fa-user text-muted"></i></span>
                <input type="text" class="form-control border-start-0 ps-0" id="username" name="username" placeholder="Enter username" required>
            </div>
        </div>
        
        <div class="mb-3">
            <label for="password" class="form-label fw-600">Password</label>
            <div class="input-group">
                <span class="input-group-text bg-white border-end-0"><i class="fas fa-lock text-muted"></i></span>
                <input type="password" class="form-control border-start-0 ps-0" id="password" name="password" placeholder="Enter password" required>
            </div>
        </div>
        
        <div class="mb-3 form-check d-flex justify-content-between">
            <div>
                <input type="checkbox" class="form-check-input" id="remember" name="remember">
                <label class="form-check-label text-muted small" for="remember">Remember me</label>
            </div>
        </div>
        
        <div class="d-grid gap-2 mt-4">
            <button type="submit" class="btn btn-primary fw-bold py-2">Sign In</button>
        </div>
    </form>
    
    <div class="text-center mt-4 text-muted small">
        Don't have an account? <a href="{{ url_for('auth.register') }}" class="text-primary text-decoration-none fw-600">Register here</a>
    </div>
</div>
{% endblock %}
